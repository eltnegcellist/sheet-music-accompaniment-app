services:
  backend:
    platform: linux/amd64
    build:
      context: ./backend
      args:
        AUDIVERIS_VERSION: ${AUDIVERIS_VERSION:-5.10.2}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/cache:/app/cache
      # Mount tests + params so the real-PDF E2E harness can read them
      # from the container. The cache directory under tests/fixtures/
      # persists on the host for fast iteration across container restarts.
      - ./backend/tests:/app/tests
      - ./backend/params:/app/params
      - audiveris_cache:/root/.audiveris
    environment:
      AUDIVERIS_HOME: /opt/audiveris
      PYTHONUNBUFFERED: "1"
    command: python3 -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    environment:
      VITE_BACKEND_URL: http://localhost:8000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  audiveris_cache:
