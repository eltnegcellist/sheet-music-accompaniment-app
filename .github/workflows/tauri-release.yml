name: tauri-release

# Release / bundle workflow. Kept separate from tauri-ci so PR pushes
# don't pull ~500MB of Audiveris + JRE downloads on every commit. Trigger
# manually from the Actions tab, or extend the `on:` block once signing
# certs are wired up to fire on tag pushes (e.g. v0.1.0).
on:
  workflow_dispatch:
    inputs:
      upload-artifact:
        description: "Upload the Tauri bundle as a workflow artifact"
        type: boolean
        default: true

concurrency:
  group: tauri-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-bundle:
    name: Linux x86_64 .AppImage / .deb
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux GTK + bundling deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            tesseract-ocr \
            tesseract-ocr-eng \
            tesseract-ocr-ita \
            imagemagick

      - name: Install backend + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e backend

      # Step 1 of the README's Tauri flow: stage Audiveris + JRE + Tesseract.
      - name: Stage bundled runtime
        run: bash scripts/fetch_runtime_linux.sh

      # Step 2: PyInstaller the FastAPI sidecar into src-tauri/bin/.
      - name: Build Python sidecar
        run: bash scripts/build_sidecar.sh

      # Step 3: tauri:build needs real icon files even if we don't yet
      # have a designed logo. Generate a solid-colour placeholder set
      # so the bundler is happy; release builds will overwrite this.
      - name: Generate placeholder icons
        working-directory: frontend
        run: |
          mkdir -p src-tauri/icons
          convert -size 1024x1024 xc:'#1f6feb' /tmp/icon-source.png
          npx --yes @tauri-apps/cli icon /tmp/icon-source.png -o src-tauri/icons

      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      # Pre-bundle gate: confirm sidecar + JRE + Audiveris + Tesseract
      # are wired up correctly. Cheaper to fail here than to debug a
      # broken .AppImage post-bundle.
      - name: Validate bundle layout
        run: bash scripts/validate_bundle.sh

      # Note: --no-bundle would skip artifact creation; we want the
      # AppImage and .deb so omit it.
      - name: tauri build
        working-directory: frontend
        run: npm run tauri:build

      - name: Upload bundle
        if: ${{ inputs.upload-artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: tauri-linux-x86_64
          path: |
            frontend/src-tauri/target/release/bundle/appimage/*.AppImage
            frontend/src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error
          retention-days: 14
